appId: com.pwrdrvr.pwragent
productName: PwrAgent
copyright: "Copyright © 2026 PwrDrvr LLC."

# Pinned so `pnpm deploy --prod` works — electron lives in devDependencies
# and is therefore not present in the deploy stage's node_modules.
# Keep this in sync with apps/desktop/package.json devDependencies.electron.
electronVersion: 41.2.1

# Bundle layout
asar: true
asarUnpack:
  - "**/*.node"
compression: normal

# Files included in the .app bundle. Run via apps/desktop/scripts/release.mjs
# which first runs `pnpm deploy` to materialize a flat node_modules tree, since
# pnpm's symlinked virtual store interacts poorly with electron-builder's
# default node_modules walk.
files:
  - "out/**/*"
  - "package.json"
  # Compiled JS only — drop sources, declarations, and sourcemaps.
  - "!**/*.map"
  - "!**/*.ts"
  - "!**/*.tsx"
  - "!**/*.d.ts"
  - "!**/tsconfig*.json"
  # Tests of any flavor.
  - "!**/*.test.*"
  - "!**/*.spec.*"
  - "!**/__tests__/**"
  - "!**/__mocks__/**"
  - "!**/test/**"
  - "!**/tests/**"
  - "!**/e2e/**"
  - "!**/playwright.config.*"
  # Markdown / docs from third-party packages and our own workspace packages.
  # (Workspace packages are inlined by vite/electron-vite into out/; the copies
  # in node_modules are dead weight.) Runtime markdown such as the review
  # prompt is imported via Vite's ?raw and inlined into the compiled JS.
  - "!**/*.md"
  - "!**/*.mdx"
  - "!**/docs/**"
  # Misc dotfiles and examples that occasionally ship inside dependency tarballs.
  - "!**/.env*"
  - "!**/.npmignore"
  - "!**/.editorconfig"
  - "!**/.eslintrc*"
  - "!**/.prettierrc*"
  - "!**/.github/**"
  # Dev-only Electron native prebuilds are single-arch. electron-builder
  # rebuilds build/Release for each target arch before creating the universal
  # app, so including electron-native would break universal merge.
  - "!**/electron-native/**"
  # Our own workspace package metadata is unused at runtime — vite inlines.
  - "!**/node_modules/@pwragent/*/AGENTS.md"
  - "!**/node_modules/@pwragent/*/src/**"

extraResources:
  - from: LICENSE
    to: LICENSE
  - from: THIRD_PARTY_LICENSES
    to: THIRD_PARTY_LICENSES
  - from: CHANGELOG.md
    to: CHANGELOG.md

# Electron fuses — ASAR integrity is NOT on by default in electron-builder.
# Enable it explicitly so the runtime aborts if the .asar is tampered with.
electronFuses:
  runAsNode: false
  enableCookieEncryption: true
  enableNodeOptionsEnvironmentVariable: false
  enableNodeCliInspectArguments: false
  enableEmbeddedAsarIntegrityValidation: true
  onlyLoadAppFromAsar: true
  loadBrowserProcessSpecificV8Snapshot: false
  grantFileProtocolExtraPrivileges: true

mac:
  category: public.app-category.developer-tools
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # mac.notarize: true reads APPLE_API_KEY/APPLE_API_KEY_ID/APPLE_API_ISSUER
  # (preferred for CI) or APPLE_ID/APPLE_APP_SPECIFIC_PASSWORD/APPLE_TEAM_ID
  # (acceptable locally) from the environment. Do NOT commit these.
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Helper bundle renames — verify post-build with Activity Monitor that all
  # four child processes carry the PwrAgent brand, not "Electron Helper".
  # Note: the field is helperGPUBundleId (capital GPU) per electron-builder
  # source; lowercase 'gpu' silently no-ops.
  helperBundleId: com.pwrdrvr.pwragent.helper
  helperRendererBundleId: com.pwrdrvr.pwragent.helper.Renderer
  helperGPUBundleId: com.pwrdrvr.pwragent.helper.GPU
  helperPluginBundleId: com.pwrdrvr.pwragent.helper.Plugin
  extendInfo:
    NSHumanReadableCopyright: "Copyright © 2026 PwrDrvr LLC."
    LSMinimumSystemVersion: "12.0"
    LSApplicationCategoryType: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [universal]
    - target: zip
      arch: [universal]

linux:
  icon: build/icon.png
  executableName: pwragent
  category: Development
  maintainer: PwrDrvr LLC
  synopsis: Thread-centric coding agent desktop app
  description: PwrAgent is a thread-centric coding agent desktop app for local development workflows.
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  target:
    - target: deb
      arch: [x64, arm64]
  desktop:
    entry:
      Name: PwrAgent
      Comment: Thread-centric coding agent desktop app
      StartupWMClass: PwrAgent

deb:
  priority: optional

dmg:
  background: build/dmg-background.png
  window:
    width: 660
    height: 400
  iconSize: 112
  iconTextSize: 12
  contents:
    - x: 170
      y: 230
      type: file
    - x: 500
      y: 230
      type: link
      path: /Applications
  writeUpdateInfo: false

# GitHub Releases are the canonical desktop artifact channel. macOS update
# metadata is still produced by electron-builder; Linux .deb packages are
# uploaded by the release workflow after native packaging and checksum creation.
publish:
  provider: github
  owner: pwrdrvr
  repo: PwrAgent
  private: false
  releaseType: release
