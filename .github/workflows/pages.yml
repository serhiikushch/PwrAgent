# Build the docs-site/ Jekyll site and publish it to GitHub Pages,
# which serves docs.pwragent.ai via the CNAME in docs-site/CNAME.
#
# Source mode in GitHub Settings → Pages must be set to "GitHub Actions"
# (one-time setup). Pages' built-in "Deploy from a branch" mode only
# supports `/` or `/docs`, neither of which fits — `docs/` is already
# used for plans/brainstorms/architecture in this repo.

name: Deploy docs.pwragent.ai

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/pages.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Serialize the production deploy (one in-flight at a time, no
# canceling so a hot-fix can't be clobbered mid-deploy). PR builds
# don't deploy, so they get their own per-ref group and can run in
# parallel with main's deploy without queueing behind it.
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pages-pr-{0}', github.ref) || 'pages' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - uses: actions/checkout@v5

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: docs-site

      - id: pages
        uses: actions/configure-pages@v5

      - name: Build Jekyll site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs-site/_site

  deploy:
    # PR runs only validate the build; deploys are gated to main.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
