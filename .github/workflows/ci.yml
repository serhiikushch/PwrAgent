name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          lookup-only: "true"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: License metadata
        run: |
          if ! pnpm licenses:check; then
            echo "License check failed; forcing pnpm to relink dependencies before retrying."
            pnpm install --frozen-lockfile --force
            pnpm licenses:check
          fi

      - name: Type check
        run: pnpm typecheck

      - name: Dependency boundaries
        run: |
          pnpm exec depcruise --config .dependency-cruiser.cjs \
            --output-type json --output-to cruise-result.json \
            packages/ apps/desktop/src/
          pnpm exec depcruise-fmt --exit-code cruise-result.json

      - name: Boundary violation summary
        if: failure()
        run: |
          pnpm exec depcruise-fmt -T markdown cruise-result.json >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test
        run: pnpm run test

  desktop-e2e:
    name: Desktop E2E
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Run desktop replay-backed Electron tests
        run: xvfb-run --auto-servernum pnpm run test:desktop-e2e

      - name: Upload desktop Playwright artifacts
        uses: actions/upload-artifact@v5
        if: ${{ !cancelled() }}
        with:
          name: desktop-e2e-artifacts
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
          retention-days: 30

  live-agent-core:
    name: Live Agent Core
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect live agent-core inputs
        id: changes
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$GITHUB_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          git diff --name-only "$base" "$head" > changed-files.txt

          relevant=false
          matched_path=""
          while IFS= read -r path; do
            case "$path" in
              packages/agent-core/*|packages/shared/src/contracts/normalized-app-server.ts|packages/shared/src/contracts/navigation.ts|packages/shared/src/thread-titles.ts|packages/shared/src/index.ts|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.base.json|vitest.workspace.ts|.nvmrc|.github/workflows/ci.yml)
                relevant=true
                matched_path="$path"
                break
                ;;
            esac
          done < changed-files.txt

          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"

          if [[ "$relevant" == "true" ]]; then
            echo "Live agent-core input changed: $matched_path"
            echo "Live agent-core inputs changed; running live smoke test."
          else
            {
              echo "### Live Agent Core"
              echo
              echo "Skipped live agent-core smoke test because no agent-core inputs changed."
              echo
              echo "Relevant inputs: \`packages/agent-core/**\`, shared files imported by agent-core, root dependency/test config, and this workflow."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install Node.js and dependencies
        if: steps.changes.outputs.relevant == 'true'
        uses: pwrdrvr/configure-nodejs@v1

      - name: Install ripgrep
        if: steps.changes.outputs.relevant == 'true'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Live agent-core smoke and tool coverage
        if: steps.changes.outputs.relevant == 'true'
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://api.x.ai/v1
          GROK_MODEL: grok-4.20-reasoning
        run: pnpm --filter @pwragent/agent-core test:live
