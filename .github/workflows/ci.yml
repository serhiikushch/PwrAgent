name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  install-deps:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        with:
          lookup-only: "true"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Lint
        run: pnpm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Build
        run: pnpm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test
        run: pnpm run test

  live-agent-core:
    name: Live Agent Core
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Live agent-core smoke and tool coverage
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://api.x.ai/v1
          GROK_MODEL: grok-4.20-reasoning
        run: pnpm --filter @pwragnt/agent-core test:live
