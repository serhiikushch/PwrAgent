name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs-site/**'
      - '.github/workflows/pages.yml'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
    paths-ignore:
      - 'docs-site/**'
      - '.github/workflows/pages.yml'

permissions:
  contents: read

jobs:
  # Validation-only PR: rerun CI against pwrdrvr/configure-nodejs@v1 after v1 moved to v1.1.1.
  install-deps:
    name: Install Dependencies
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'labeled' || github.event.label.name == 'ci:live-agent-core' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        timeout-minutes: 10

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        timeout-minutes: 10
        with:
          node-version: 24.x
          lookup-only: "true"

  lint:
    name: Lint
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'labeled' }}
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        timeout-minutes: 10

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        timeout-minutes: 10
        with:
          node-version: 24.x

      - name: License metadata
        timeout-minutes: 10
        run: pnpm licenses:check

      - name: Type check
        timeout-minutes: 10
        run: pnpm typecheck

      - name: Dependency boundaries
        timeout-minutes: 10
        run: |
          pnpm exec depcruise --config .dependency-cruiser.cjs \
            --output-type json --output-to cruise-result.json \
            packages/ apps/desktop/src/
          pnpm exec depcruise-fmt --exit-code cruise-result.json

      - name: Boundary violation summary
        if: failure()
        timeout-minutes: 10
        run: |
          pnpm exec depcruise-fmt -T markdown cruise-result.json >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'labeled' }}
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        timeout-minutes: 10

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        timeout-minutes: 10
        with:
          node-version: 24.x

      - name: Build
        timeout-minutes: 10
        run: pnpm run build

  test:
    name: Test
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'labeled' }}
    runs-on: ubuntu-latest
    needs: install-deps
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        timeout-minutes: 10

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        timeout-minutes: 10
        with:
          node-version: 24.x

      - name: Install ripgrep
        uses: ./.github/actions/install-ripgrep
        timeout-minutes: 5

      - name: Test
        timeout-minutes: 10
        run: pnpm run test

  desktop-e2e:
    name: Desktop E2E
    if: ${{ github.event_name != 'pull_request' || github.event.action != 'labeled' }}
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        timeout-minutes: 10

      - name: Install Node.js and dependencies
        uses: pwrdrvr/configure-nodejs@v1
        timeout-minutes: 10
        with:
          node-version: 24.x

      - name: Run desktop replay-backed Electron tests
        timeout-minutes: 10
        run: xvfb-run --auto-servernum pnpm run test:desktop-e2e

      - name: Upload desktop Playwright artifacts
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        timeout-minutes: 10
        with:
          name: desktop-e2e-artifacts
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
          retention-days: 30

  live-agent-core:
    name: Live Agent Core
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    needs: install-deps
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        timeout-minutes: 10
        with:
          fetch-depth: 0

      - name: Detect live agent-core inputs
        id: changes
        shell: bash
        timeout-minutes: 10
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          EVENT_LABEL_NAME: ${{ github.event.label.name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          live_agent_core_label="ci:live-agent-core"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$GITHUB_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            base="$(git rev-list --max-parents=0 "$head")"
          fi

          relevant=false
          matched_path=""
          if [[ "$EVENT_NAME" == "pull_request" && "$EVENT_ACTION" == "labeled" && "$EVENT_LABEL_NAME" == "$live_agent_core_label" ]]; then
            relevant=true
            matched_path="pull request label: $live_agent_core_label"
          else
            git diff --name-only "$base" "$head" > changed-files.txt

            while IFS= read -r path; do
              case "$path" in
                packages/agent-core/src/app-server/*|packages/agent-core/src/config/*|packages/agent-core/src/persistence/*|packages/agent-core/src/providers/*|packages/agent-core/src/testing/*|packages/agent-core/src/tools/*|packages/agent-core/src/__tests__/grok-live.test.ts|packages/agent-core/package.json|package.json|pnpm-lock.yaml|pnpm-workspace.yaml|tsconfig.base.json|vitest.workspace.ts|.nvmrc)
                  relevant=true
                  matched_path="$path"
                  break
                  ;;
              esac
            done < changed-files.txt
          fi

          echo "relevant=$relevant" >> "$GITHUB_OUTPUT"

          if [[ "$relevant" == "true" ]]; then
            echo "Live agent-core input changed: $matched_path"
            echo "Live agent-core inputs changed; running live smoke test."
          else
            {
              echo "### Live Agent Core"
              echo
              echo "Skipped live agent-core smoke test because no agent-core inputs changed."
              echo
              echo "Relevant inputs: live app-server/provider/config/tool paths, the live test itself, agent-core package metadata, root dependency/test config, or the \`ci:live-agent-core\` PR label."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Install Node.js and dependencies
        if: steps.changes.outputs.relevant == 'true'
        uses: pwrdrvr/configure-nodejs@v1
        timeout-minutes: 10
        with:
          node-version: 24.x

      - name: Install ripgrep
        if: steps.changes.outputs.relevant == 'true'
        uses: ./.github/actions/install-ripgrep
        timeout-minutes: 5

      - name: Live agent-core smoke and tool coverage
        if: steps.changes.outputs.relevant == 'true'
        timeout-minutes: 10
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://api.x.ai/v1
          GROK_MODEL: grok-4.20-reasoning
        run: pnpm --filter @pwragent/agent-core test:live
