version: 2

updates:
  # pnpm workspace. Dependabot uses the npm ecosystem value for pnpm.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    versioning-strategy: "increase-if-necessary"
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 7
    # @types/node tracks the Node runtime, which is pinned to v24
    # (.nvmrc + CI node-version: 24.x). Block major bumps so v25+ types
    # don't sneak ahead of the runtime via a grouped dev-dep PR.
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      # Electron majors need a planned desktop runtime migration. Native module
      # prebuild availability, packaging behavior, and Electron breaking changes
      # need human review before a PR is worth opening.
      - dependency-name: "electron"
        update-types:
          - "version-update:semver-major"
    groups:
      vite-toolchain:
        patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "electron-vite"
        dependency-type: "development"
        update-types:
          - "major"
          - "minor"
          - "patch"
      electron-runtime-minor-patch:
        patterns:
          - "electron"
          - "@electron/*"
          - "electron-builder"
          - "electron-updater"
        update-types:
          - "minor"
          - "patch"
      tiptap-prosemirror:
        patterns:
          - "@tiptap/*"
          - "prosemirror-*"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-production-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "@tiptap/*"
          - "prosemirror-*"
          - "electron-updater"
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      npm-development-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "vite"
          - "@vitejs/plugin-react"
          - "electron-vite"
          - "electron"
          - "@electron/*"
          - "electron-builder"
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 7
    # We pin actions to major-version tags (e.g. `@v1`). Those tags silently
    # absorb every minor and patch release upstream, so Dependabot PRs that
    # rewrite `@v1` to `@v1.0.1` are pure noise. Only surface major bumps,
    # which actually warrant a human review.
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"

# docs-site dependabot entries (bundler + docker for /docs-site)
# moved to pwrdrvr/docs.pwragent.ai when the docs split out of this
# repo on 2026-05-25. Add new entries to that repo's dependabot.yml.
